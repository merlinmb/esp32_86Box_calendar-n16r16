; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc1-n16r16]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
;espressif32@6.6.0
 ;https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip@latest
board = esp32-s3-devkitc1-n16r16
framework = arduino

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -DCORE_DEBUG_LEVEL=0

;upload_speed =  115200
monitor_speed = 115200
upload_port = COM21

lib_deps =
    https://github.com/moononournation/Arduino_GFX.git
    https://github.com/lvgl/lvgl.git#v8.3.11
    https://github.com/schreibfaul1/ESP32-audioI2S.git
    https://github.com/TAMCTec/gt911-arduino.git
    nickgammon/Regexp
    bblanchon/ArduinoJson @ ^7.0.0
    arduino-libraries/NTPClient @ ^3.2.1
    PaulStoffregen/Time @ ^1.6.1
    Timezone @ ^1.2.4
    knolleary/PubSubClient @ ^2.8